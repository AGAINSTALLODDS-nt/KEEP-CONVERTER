<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Google Keep → Apple Notes Converter</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background-color: #f5f5f7; color: #333; }
    
    /* Прогресс бар */
    #progressBar { width: 100%; background-color: #e0e0e0; border-radius: 6px; margin-top: 15px; height: 8px; overflow: hidden; }
    #bar { height: 100%; width: 0%; background-color: #007aff; transition: width 0.3s ease; }
    
    /* Контейнер заметок */
    .label-column { display: inline-block; vertical-align: top; width: 240px; margin-right: 15px; margin-bottom: 20px; background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 15px; }
    .note-item { margin-bottom: 8px; padding: 8px; border-radius: 6px; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 8px; }
    .note-item:hover { background-color: #f0f0f5; }
    .note-item input[type="checkbox"] { cursor: pointer; z-index: 2; }
    .note-item label { cursor: pointer; flex-grow: 1; word-break: break-word; font-size: 14px; line-height: 1.4; }
    
    /* Лог */
    #log { margin-top: 30px; padding: 15px; background: #fff; border-radius: 8px; font-family: monospace; max-height: 250px; overflow-y: auto; font-size: 12px; border: 1px solid #ddd; }
    
    /* Кнопки */
    button, select, input[type="file"]::file-selector-button { padding: 8px 16px; border-radius: 6px; border: 1px solid #ccc; background: #fff; cursor: pointer; font-size: 14px; transition: all 0.2s; }
    button:hover { background: #f9f9f9; border-color: #bbb; }
    #btnSelectAll, #exportButton { margin-left: 10px; background: #007aff; color: white; border: none; }
    #btnSelectAll:hover, #exportButton:hover { background: #005bb5; }
    
    /* Язык справа сверху */
    #languageSelector { float: right; margin-top: -45px; }

    /* === МОДАЛЬНОЕ ОКНО ПРОСМОТРА === */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
    .modal-content { background: #fff; width: 90%; max-width: 600px; max-height: 85vh; border-radius: 12px; padding: 25px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; }
    .modal-close { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #888; line-height: 1; }
    .modal-close:hover { color: #333; }
    .modal-title { font-size: 20px; font-weight: 600; margin-bottom: 15px; padding-right: 30px; word-break: break-word; }
    .modal-body { font-size: 15px; line-height: 1.6; color: #444; white-space: pre-wrap; }
    .modal-body ul { padding-left: 20px; margin: 10px 0; }
    .modal-body li { margin-bottom: 6px; }
    .todo-checked { text-decoration: line-through; color: #888; }
  </style>
</head>
<body>

<h1 id="pageTitle">Google Keep → Apple Notes Converter</h1>

<select id="languageSelector" onchange="changeLanguage(this.value)">
  <option value="en">English</option>
  <option value="ru">Русский</option>
</select>

<div style="margin-top: 60px;">
  <input type="file" id="zipInput" accept=".zip" onchange="startProcessing()">
  <button id="btnSelectAll" onclick="selectAllNotes()">Select All</button>
  <button id="exportButton" onclick="exportSelectedNotes()">Export Selected Notes</button>
</div>

<div id="progressBar"><div id="bar"></div></div>
<div id="notesContainer" style="margin-top: 25px;"></div>
<div id="log"></div>

<!-- Модальное окно -->
<div id="noteModal" class="modal-overlay" onclick="if(event.target===this) closeModal()">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <div id="modalTitle" class="modal-title"></div>
    <div id="modalBody" class="modal-body"></div>
  </div>
</div>

<script src="https://unpkg.com/fflate/umd/index.js"></script>
<script src="script.js"></script>
</body>
</html>
